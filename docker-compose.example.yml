services:
  agent1:
    build: .
    container_name: agent1
    restart: unless-stopped
    env_file: .env.agent1
    volumes:
      - codex_auth_1:/home/agent/.codex

  agent2:
    build: .
    container_name: agent2
    restart: unless-stopped
    env_file: .env.agent2
    volumes:
      - codex_auth_2:/home/agent/.codex

  agent3:
    build: .
    container_name: agent3
    restart: unless-stopped
    env_file: .env.agent3
    volumes:
      - codex_auth_3:/home/agent/.codex

volumes:
  codex_auth_1:
  codex_auth_2:
  codex_auth_3:
